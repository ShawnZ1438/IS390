seed: 42

data:
  # Set to your CLEAR root; if empty or missing, synthetic data can be generated.
  root: ""
  layout: "auto"              # auto | imagefolder | manifest_csv
  bucket_glob: "bucket_*"     # how to discover time buckets
  manifest_name: "labels.csv" # used when layout == manifest_csv
  image_size: 224
  num_workers: 4

synthetic:
  enabled: true
  out_root: "./data/synth_CLEAR"
  layout: "imagefolder"       # imagefolder | manifest_csv
  num_buckets: 6
  num_classes: 11
  imgs_per_class_per_bucket: 20
  seed: 123

model:
  backbone: "resnet18"
  feature_dim: 512
  num_classes: "auto"         # "auto" recommended for prototyping
  head: "linear"

train:
  device: "cuda"
  batch_size: 64
  epochs_per_bucket: 1
  lr: 0.001
  weight_decay: 0.0005
  log_every: 50

replay:
  enabled: true
  ratio: 0.30
  buffer_size: 2000
  strategy: "reservoir"       # reservoir | biased_reservoir | fifo
  alpha: 1.0
  per_class_cap: 50

inemo_like:
  enabled: true
  prototypes:
    enabled: true
    momentum: 0.9
  latent_partition:
    enabled: true
    strength: 0.05
    margin: 0.2

eval:
  protocol: "streaming"       # streaming | iid_like
  shadow_holdout_ratio: 0.0   # >0 enables retention/forgetting curves
  compute_forgetting: true

logging:
  out_dir: "./runs"
  save_model: false
  save_class_map: true
  make_plots: true